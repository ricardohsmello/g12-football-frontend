<div class="panel-header panel-header-sm">
</div>

<div class="main-content">
  <div class="row">
    <div class="col-md-12">
      <div class="card">

        <div class="card-header">
          <h4 class="card-title">🏆 Classificação</h4>

          <form [formGroup]="roundFormGroup" style="display: flex; gap: 16px; flex-wrap: wrap;">
            <mat-form-field appearance="outline" style="width: 220px;">
              <mat-label>Competição</mat-label>
              <mat-select formControlName="competitionCtrl" [compareWith]="compareCompetition" (selectionChange)="onCompetitionChange()">
                <mat-option *ngFor="let c of competitions" [value]="c">{{ c.label }}</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" style="width: 240px;">
              <mat-label>Rodada</mat-label>
              <mat-select formControlName="roundCtrl" (selectionChange)="onRoundChange()">
                <mat-option [value]="0">Total Geral</mat-option>
                <mat-option *ngFor="let round of availableRounds" [value]="round">
                  {{ roundLabel(round) }}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </form>
        </div>

        <mat-progress-spinner
                *ngIf="isLoading"
                mode="indeterminate"
                diameter="80"
                color="accent"
                style="margin: 16px auto; display: block;">
        </mat-progress-spinner>

        <div class="card-body" *ngIf="!isLoading">
          <div class="table-responsive">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th scope="col">Posição</th>
                  <th scope="col">Jogador</th>
                  <th scope="col">Pontos</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let entry of scoreboard; let i = index">
                  <td class="text-left">{{ i + 1 }}</td>
                  <td class="text-left">{{ entry.username }}</td>
                  <td class="text-left">{{ entry.points }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
