<div class="panel-header panel-header-gp">
</div>

<div class="main-content" style="padding: 24px;">

  <div class="card" style="margin-bottom: 24px;">
    <div class="card-header">
      <h4 class="card-title">Gráficos</h4>
      <form [formGroup]="filterFormGroup" style="display: flex; gap: 16px; flex-wrap: wrap;">
        <mat-form-field appearance="outline" style="width: 220px;">
          <mat-label>Competição</mat-label>
          <mat-select formControlName="competitionCtrl" [compareWith]="compareCompetition" (selectionChange)="onCompetitionChange()">
            <mat-option *ngFor="let c of competitions" [value]="c">{{ c.label }}</mat-option>
          </mat-select>
        </mat-form-field>
      </form>
    </div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 24px; align-items: center;">

    <mat-card style="width: 100%; max-width: 100%;" *ngFor="let url of chartUrls; let i = index">
      <iframe
        [src]="url"
        style="border: none; border-radius: 2px; box-shadow: 0 2px 10px 0 rgba(70, 76, 79, .2);"
        [style.background]="i === 0 ? '#21313C' : '#FFFFFF'"
        width="100%"
        height="480">
      </iframe>
    </mat-card>

  </div>

</div>
